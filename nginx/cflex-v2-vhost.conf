# cflex.runless.co.uk — production HTTPS config
# HTTP (80): ACME 갱신 + HTTPS 리다이렉트
# HTTPS (443): 모든 트래픽 + 보안 헤더

server {
    include snippets/deny-hidden.conf;
  listen 80;
  server_name cflex.runless.co.uk 20.25.17.81 _;
  client_max_body_size 10M;

  # Let's Encrypt 갱신 webroot 우선 매치
  location /.well-known/acme-challenge/ {
    root /opt/cflex-v2/cflex-frontend/dist;
    try_files $uri =404;
  }

  # 그 외 HTTP -> HTTPS (도메인 매치 시)
  if ($host = cflex.runless.co.uk) {
    return 301 https://$host$request_uri;
  }

  # IP 직접 접근은 임시로 HTTP 허용 (NSG 443 오픈 후 이 블록도 리다이렉트로 변경 가능)
  location / {
    root /opt/cflex-v2/cflex-frontend/dist;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  # 기존 proxy rules — IP 직접접근 호환용
  location /v1/uc/ { proxy_pass http://127.0.0.1:3100; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 30s; }
  location /v1/   { proxy_pass http://127.0.0.1:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; proxy_buffering off; }
  location /health { proxy_pass http://127.0.0.1:3000/health; }
  location /noc/ { proxy_pass http://127.0.0.1:8091/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Prefix /noc; proxy_read_timeout 60s; proxy_buffering off; }
  location /api/telemetry { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; }
  location /api/incident  { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; }
  location /api/snow/     { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; }
  location /api/sla/      { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; }
  location /api/teams/    { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; }
  location /api/uc/       { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; }
  location /snow/    { proxy_pass http://172.172.161.236:8080/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
  location /incidents { proxy_pass http://172.172.161.236:8080; proxy_set_header Host $host; }
  location /ebond/    { proxy_pass http://172.172.161.236:8080; proxy_set_header Host $host; }
















}

server {
    include snippets/deny-hidden.conf;
  listen 443 ssl http2;
  server_name cflex.runless.co.uk;
  client_max_body_size 10M;
    ssl_certificate /etc/letsencrypt/live/cflex.runless.co.uk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cflex.runless.co.uk/privkey.pem; # managed by Certbot

  # SSL 강화
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;

  # 보안 헤더
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # X-Frame-Options removed — using CSP frame-ancestors instead
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://cflex.runless.co.uk; frame-ancestors 'self' https://cflex.runless.co.uk https://dev.cflex.runless.co.uk; frame-src 'self' https://dev.cflex.runless.co.uk" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # ── Proxy rules (HTTP server와 동일) ──
  # DISABLED dev-proxy: location = /v1/me           { proxy_pass http://127.0.0.1:4002; proxy_set_header Host $host; proxy_read_timeout 30s; }
  # DISABLED dev-proxy: location = /v1/modules      { proxy_pass http://127.0.0.1:4002; proxy_set_header Host $host; proxy_read_timeout 30s; }
  # DISABLED dev-proxy: location /v1/me/            { proxy_pass http://127.0.0.1:4002; proxy_set_header Host $host; proxy_read_timeout 30s; }

  location /v1/uc/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 30s;
  }

  location /v1/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
    proxy_buffering off;
  }

  location /health { proxy_pass http://127.0.0.1:3000/health; }

  location /noc/ {
    proxy_pass http://127.0.0.1:8091/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Prefix /noc;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_buffering off;
  }

  location /api/telemetry { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location /api/incident  { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location /api/snow/     { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location /api/sla/      { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location /api/teams/    { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  # include snippets/sentinel-connect.conf;  # disabled — Sentinel moving to own subdomain
  location /api/uc/       { proxy_pass http://127.0.0.1:8091; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }

  location /snow/ {
    proxy_pass http://172.172.161.236:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }

  location /incidents { proxy_pass http://172.172.161.236:8080; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
  location /ebond/    { proxy_pass http://172.172.161.236:8080; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }

  location / {
    root /opt/cflex-v2/cflex-frontend/dist;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }








}
