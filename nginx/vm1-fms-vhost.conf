# C-Flex FMS — standalone deployment on VM1 (172.172.161.236)
# Reuses the existing cflex-frontend bundle but forces all paths to /fms
# so the user never sees the NOC shell / Sentinel routing. API calls are
# proxied to the canonical cflex-v2 backend on cflex.runless.co.uk.

# Phase 1: HTTP only. Once DNS resolves, certbot will add the 443 block.

server {
    server_name fms.runless.co.uk 172.172.161.236 _;

    root /opt/cflex-fms/frontend-dist;
    index index.html;

    # ACME challenge for Let's Encrypt (auto-cert phase 2)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Send root visitors straight to /fms (skip NOC shell)
    location = / { return 302 /fms; }

    # API: proxy to canonical cflex-v2 backend over TLS, preserve auth headers
    location /v1/ {
        proxy_pass https://cflex.runless.co.uk;
        proxy_ssl_server_name on;
        proxy_ssl_name cflex.runless.co.uk;
        proxy_set_header Host cflex.runless.co.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # SPA — serve index.html for /fms/* navigations
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide the bundled SW (kill-switch from cflex-v2)
    location = /sw.js {
        add_header Cache-Control "no-store" always;
        try_files /sw.js =404;
    }

    # No-cache on HTML, long cache on assets
    location ~* \.(html|json)$ { add_header Cache-Control "no-store" always; }
    location /assets/         { add_header Cache-Control "public, max-age=31536000, immutable" always; }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fms.runless.co.uk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fms.runless.co.uk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = fms.runless.co.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;
    server_name fms.runless.co.uk 172.172.161.236 _;
    return 404; # managed by Certbot


}