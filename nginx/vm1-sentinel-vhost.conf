# sentinel.runless.co.uk — Claude-style standalone Sentinel workspace
# Forces all paths to /sentinel so users only see the AI Ops console.
server {
    server_name sentinel.runless.co.uk;
    root /opt/cflex-fms/frontend-dist;
    index index.html;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location = / { return 302 /sentinel; }

    # Proxy to canonical cflex-v2 backend (Sentinel APIs still live there).
    location /v1/agent/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /v1/ {
        proxy_pass https://cflex.runless.co.uk;
        proxy_ssl_server_name on;
        proxy_set_header Host cflex.runless.co.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1; proxy_buffering off; proxy_read_timeout 120s;
    }
    location /sc/ {
        proxy_pass https://cflex.runless.co.uk;
        proxy_ssl_server_name on;
        proxy_set_header Host cflex.runless.co.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1; proxy_buffering off; client_max_body_size 25m;
    }
    location / { try_files $uri $uri/ /index.html; }
    location /assets/  { add_header Cache-Control "public, max-age=31536000, immutable" always; }
    location ~* \.(html|json)$ { add_header Cache-Control "no-store" always; }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sentinel.runless.co.uk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sentinel.runless.co.uk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = sentinel.runless.co.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name sentinel.runless.co.uk;
    return 404; # managed by Certbot


}