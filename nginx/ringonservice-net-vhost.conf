server {
    listen 80;
    listen [::]:80;
    server_name ringonservice.net www.ringonservice.net;

    location /.well-known/acme-challenge/ {
        root /var/www/ringonservice-net;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ringonservice.net www.ringonservice.net;

    ssl_certificate     /etc/letsencrypt/live/ringonservice.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ringonservice.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/ringonservice-net;
    index index.html;

    # Block hidden file fishing
    location ~ /\.(env|git|aws|svn|hg|DS_Store|htaccess) {
        deny all;
        return 404;
    }

    # Pretty URLs without .html
    location = /privacy-policy { try_files /privacy-policy.html =404; }
    location = /terms          { try_files /terms.html =404; }
    location = /sms-optin           { try_files /sms-optin.html =404; }
    location = /sms-optout          { try_files /sms-optout.html =404; }
    location = /terms-and-conditions { try_files /sms-terms.html =404; }

    location / {
        try_files $uri $uri/ =404;
    }
}
