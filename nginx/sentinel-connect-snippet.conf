# Sentinel Connect — media (no auth, public-but-unguessable filenames)
location /sc/media/ {
  proxy_pass http://127.0.0.1:3200/media/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_read_timeout 30s;
  expires 1d;
}
# Sentinel Connect webhooks (Meta WhatsApp, Twilio SMS, LINE)
location /sc/webhook/ {
  proxy_pass http://127.0.0.1:3200/webhook/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  client_max_body_size 25m;
  proxy_read_timeout 30s;
}
location /sc/api/ {
  proxy_pass http://127.0.0.1:3200/api/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}
location /sc/health {
  proxy_pass http://127.0.0.1:3200/health;
  proxy_set_header Host $host;
}
